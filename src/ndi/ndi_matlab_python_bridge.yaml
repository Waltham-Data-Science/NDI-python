not_applicable:

  - name: OBJECT
    matlab_path: "N/A"
    status: does_not_exist
    decision_log: >
      ndi.OBJECT does not exist in either MATLAB or Python.
      The "base object" pattern is factored into ndi.ido (identity)
      and ndi.documentservice (persistence). There is no universal
      root object class.

  - name: filesep
    matlab_path: "+ndi/filesep.m"
    status: not_applicable
    decision_log: >
      MATLAB utility returning '/' for cross-platform path
      consistency. Python uses pathlib/os.sep natively.

  - name: toolboxdir
    matlab_path: "+ndi/toolboxdir.m"
    status: not_applicable
    decision_log: >
      MATLAB-specific path resolution. Python uses
      ndi.common.ndi_common_PathConstants.

  - name: cpipeline
    matlab_path: "+ndi/cpipeline.m"
    status: not_applicable
    decision_log: >
      MATLAB calculation pipeline registry with GUI editing.
      Not ported to Python.

  - name: gui.preferencesEditor
    matlab_path: "+ndi/+gui/preferencesEditor.m"
    status: deferred
    decision_log: >
      MATLAB uifigure-based editor for ndi.preferences. Not ported
      in this commit; tracked as a separate workstream. A Python
      equivalent (likely PyQt/Tk or web UI) will live under ndi.gui
      when designed. The data model is available via
      ndi.preferences.list_items()/get()/set() in the meantime.

  # =========================================================================
  # ndi.data namespace — MATLAB-only
  # =========================================================================
  - name: data.evaluate_fitcurve
    matlab_path: "+ndi/+data/evaluate_fitcurve.m"
    status: not_applicable
    decision_log: >
      MATLAB utility for evaluating fitted curves from
      ndi.data fitting results. Python equivalent uses
      scipy.optimize curve fitting directly; no wrapper needed.

  # =========================================================================
  # ndi.setup namespace — MATLAB-only lab configurations
  # =========================================================================
  - name: setup
    matlab_path: "+ndi/+setup/"
    python_path: "ndi/setup/"
    status: implemented
    decision_log: >
      Python equivalent of MATLAB lab setup wizards. The ndi.setup.lab()
      function reads DAQ system JSON configs from ndi_common/daq_systems/
      and creates the corresponding documents in a session. Usage:
      ndi.setup.lab(session, "vhlab").

  # =========================================================================
  # ndi.docs namespace — MATLAB documentation generation
  # =========================================================================
  - name: docs
    matlab_path: "+ndi/+docs/"
    status: not_applicable
    decision_log: >
      MATLAB documentation generation utilities (all_documents2markdown,
      build, calcbuild, concatenateFiles, docfun, document2markdown,
      schemastructure2docstructure). Python uses Sphinx/mkdocs instead.
