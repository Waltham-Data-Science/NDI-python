# ndi_matlab_python_bridge.yaml — src/ndi/gui/
# The Primary Contract for the ndi.gui namespace.

project_metadata:
  bridge_version: "1.1"
  naming_policy: "Strict MATLAB Mirror"
  indexing_policy: "Semantic Parity (1-based for user concepts, 0-based for internal data)"

# =========================================================================
# Standalone functions
# =========================================================================
functions:

  - name: gui
    type: function
    matlab_path: "+ndi/+gui/gui.m"
    python_path: "ndi/gui/gui.py"
    input_arguments:
      - name: ndi_session_obj
        type_matlab: "ndi.session"
        type_python: "ndi.session.ndi_session"
    output_arguments: []
    decision_log: >
      Ported from MATLAB. Opens a GUI window to display the contents of
      an NDI session. Shows probes, DAQ readers, cache, database documents,
      and document properties. MATLAB uses figure/uicontrol; Python uses
      PySide6 QMainWindow with equivalent layout.
      Synchronized with MATLAB main as of 2026-03-13.

  - name: gui_v2
    type: function
    matlab_path: "+ndi/+gui/gui_v2.m"
    python_path: "ndi/gui/gui_v2.py"
    input_arguments:
      - name: ndi_session_obj
        type_matlab: "ndi.session"
        type_python: "ndi.session.ndi_session"
    output_arguments: []
    decision_log: >
      Ported from MATLAB. Opens an enhanced GUI with two views:
      "Experiment View" (ndi_gui_Lab) showing subjects, probes, and DAQs as
      draggable icons with connections, and "ndi_database View" (ndi_gui_Data) showing
      a searchable/filterable document table with dependency graph
      visualization. MATLAB uses axes-based rendering; Python uses
      PySide6 with QGraphicsScene for the lab view.
      Synchronized with MATLAB main as of 2026-03-13.

# =========================================================================
# Classes
# =========================================================================
classes:

  - name: ndi_gui_Data
    type: class
    matlab_path: "+ndi/+gui/ndi_gui_Data.m"
    python_path: "ndi/gui/data.py"
    python_class: "ndi_gui_Data"
    inherits: "handle"

    properties:
      - name: fullDocuments
        type_matlab: "ndi.document[]"
        type_python: "list[Any]"
        decision_log: "Exact match. Stores all loaded documents."
      - name: fullTable
        type_matlab: "cell"
        type_python: "list[list[str]]"
        decision_log: "Exact match. Rows of [name, id, type, datestamp, json]."
      - name: tempDocuments
        type_matlab: "ndi.document[]"
        type_python: "list[Any]"
        decision_log: "Exact match. Filtered document subset."
      - name: tempTable
        type_matlab: "cell"
        type_python: "list[list[str]]"
        decision_log: "Exact match. Filtered table rows."

    methods:
      - name: ndi_gui_Data
        kind: constructor
        input_arguments: []
        output_arguments:
          - name: obj
            type_python: "ndi_gui_Data"
        decision_log: >
          Ported. Creates a QWidget with a table, detail panel, and
          search controls. MATLAB uses uitable/uipanel; Python uses
          QTableWidget/QFrame.

      - name: addDoc
        input_arguments:
          - name: docs
            type_matlab: "cell array of ndi.document"
            type_python: "list[Any]"
        output_arguments: []
        decision_log: >
          Exact match. Populates the table with document name, id,
          type, and datestamp.

      - name: filter
        input_arguments: []
        output_arguments: []
        decision_log: >
          Exact match. Filters the table based on search criteria
          (contains, begins with, ends with).

      - name: clear
        input_arguments: []
        output_arguments: []
        decision_log: "Exact match. Clears the table display."

      - name: details
        input_arguments:
          - name: row_index
            type_matlab: "event.Indices"
            type_python: "int"
        output_arguments: []
        decision_log: >
          Adapted. MATLAB uses CellSelectionCallback with event.Indices;
          Python uses QTableWidget.cellClicked signal with row index.

      - name: graph
        input_arguments:
          - name: ind
            type_matlab: "numeric"
            type_python: "int"
        output_arguments: []
        decision_log: >
          Ported. Builds and displays a dependency graph for all
          documents. MATLAB uses digraph/plot; Python uses networkx
          with matplotlib or PySide6 rendering.

      - name: subgraph
        input_arguments:
          - name: ind
            type_matlab: "numeric"
            type_python: "int"
        output_arguments: []
        decision_log: >
          Ported. Builds and displays a subgraph showing only direct
          dependencies of the selected document.

  - name: ndi_gui_Icon
    type: class
    matlab_path: "+ndi/+gui/ndi_gui_Icon.m"
    python_path: "ndi/gui/icon.py"
    python_class: "ndi_gui_Icon"
    inherits: "handle"

    properties:
      - name: elem
        type_matlab: "any"
        type_python: "Any"
        decision_log: "Exact match. The NDI element this icon represents."
      - name: w
        type_matlab: "double"
        type_python: "float"
        decision_log: "Exact match. Width of the icon."
      - name: h
        type_matlab: "double"
        type_python: "float"
        decision_log: "Exact match. Height of the icon."
      - name: x
        type_matlab: "double"
        type_python: "float"
        decision_log: "Exact match. X position."
      - name: y
        type_matlab: "double"
        type_python: "float"
        decision_log: "Exact match. Y position."
      - name: c
        type_matlab: "double (1,3)"
        type_python: "tuple[float, float, float]"
        decision_log: "Exact match. RGB color tuple."
      - name: active
        type_matlab: "double"
        type_python: "int"
        decision_log: "Exact match. Activity state (0, 1, 2, or 3)."
      - name: tag
        type_matlab: "char"
        type_python: "str"
        decision_log: "Exact match. Unique tag identifier."

    methods:
      - name: ndi_gui_Icon
        kind: constructor
        input_arguments:
          - name: src
            type_matlab: "ndi.gui.ndi_gui_Lab"
            type_python: "ndi_gui_Lab"
          - name: length
            type_matlab: "numeric"
            type_python: "int"
          - name: elem
            type_matlab: "any"
            type_python: "Any"
          - name: hShift
            type_matlab: "numeric"
            type_python: "float"
          - name: vShift
            type_matlab: "numeric"
            type_python: "float"
          - name: w
            type_matlab: "numeric"
            type_python: "float"
          - name: h
            type_matlab: "numeric"
            type_python: "float"
          - name: color
            type_matlab: "double (1,3)"
            type_python: "tuple[float, float, float]"
        output_arguments:
          - name: obj
            type_python: "ndi_gui_Icon"
        decision_log: >
          Ported. Creates a visual icon with image, rectangle border,
          and connection terminal. MATLAB uses image/rectangle on axes;
          Python uses QGraphicsItem.

      - name: upload
        input_arguments: []
        output_arguments: []
        decision_log: >
          Ported. Opens a file dialog to select an image for the icon.
          MATLAB uses uigetfile; Python uses QFileDialog.getOpenFileName.

  - name: ndi_gui_Lab
    type: class
    matlab_path: "+ndi/+gui/ndi_gui_Lab.m"
    python_path: "ndi/gui/lab.py"
    python_class: "ndi_gui_Lab"
    inherits: "handle"

    properties:
      - name: editable
        type_matlab: "logical"
        type_python: "bool"
        decision_log: "Exact match."
      - name: subjects
        type_matlab: "ndi.gui.ndi_gui_Icon[]"
        type_python: "list[ndi_gui_Icon]"
        decision_log: "Exact match."
      - name: probes
        type_matlab: "ndi.gui.ndi_gui_Icon[]"
        type_python: "list[ndi_gui_Icon]"
        decision_log: "Exact match."
      - name: DAQs
        type_matlab: "ndi.gui.ndi_gui_Icon[]"
        type_python: "list[ndi_gui_Icon]"
        decision_log: "Exact match."
      - name: drag
        type_matlab: "ndi.gui.ndi_gui_Icon | []"
        type_python: "ndi_gui_Icon | None"
        decision_log: "Exact match. Currently dragged icon or None."
      - name: moved
        type_matlab: "logical"
        type_python: "bool"
        decision_log: "Exact match."
      - name: connects
        type_matlab: "double (N,N)"
        type_python: "np.ndarray"
        decision_log: "Exact match. Adjacency matrix for connections."
      - name: transmitting
        type_matlab: "logical"
        type_python: "bool"
        decision_log: "Exact match. Connection state toggle."

    methods:
      - name: ndi_gui_Lab
        kind: constructor
        input_arguments: []
        output_arguments:
          - name: obj
            type_python: "ndi_gui_Lab"
        decision_log: >
          Ported. Creates the experiment view with axes, panel,
          edit toggle, and zoom controls.

      - name: addSubject
        input_arguments:
          - name: subj
            type_matlab: "cell array"
            type_python: "list[Any]"
        output_arguments: []
        decision_log: "Exact match. Adds subject icons to the lab view."

      - name: addProbe
        input_arguments:
          - name: prob
            type_matlab: "cell array"
            type_python: "list[Any]"
        output_arguments: []
        decision_log: "Exact match. Adds probe icons to the lab view."

      - name: addDAQ
        input_arguments:
          - name: daq
            type_matlab: "cell array"
            type_python: "list[Any]"
        output_arguments: []
        decision_log: "Exact match. Adds DAQ icons to the lab view."

      - name: editCallback
        input_arguments: []
        output_arguments: []
        decision_log: "Exact match. Toggles edit mode."

      - name: grid
        input_arguments: []
        output_arguments: []
        decision_log: "Exact match. Shows/hides grid overlay."

      - name: details
        input_arguments:
          - name: src
            type_matlab: "ndi.gui.ndi_gui_Icon"
            type_python: "ndi_gui_Icon"
        output_arguments: []
        decision_log: "Exact match. Shows details panel for an icon."

      - name: setZoom
        input_arguments:
          - name: z
            type_matlab: "double"
            type_python: "float"
        output_arguments: []
        decision_log: "Exact match. Zoom in/out by factor z."

      - name: move
        input_arguments: []
        output_arguments: []
        decision_log: >
          Ported. Mouse move handler for dragging icons.
          MATLAB uses WindowButtonMotionFcn; Python uses
          QGraphicsScene mouseMoveEvent.

      - name: connect
        input_arguments:
          - name: src
            type_matlab: "ndi.gui.ndi_gui_Icon"
            type_python: "ndi_gui_Icon"
        output_arguments: []
        decision_log: >
          Exact match. Creates a connection between two icons
          using a two-click transmit/receive pattern.

      - name: updateConnections
        input_arguments: []
        output_arguments: []
        decision_log: >
          Exact match. Redraws all connection wires based on
          the adjacency matrix.

      - name: cut
        input_arguments:
          - name: src
            type_matlab: "line object"
            type_python: "Any"
        output_arguments: []
        decision_log: "Exact match. Removes a connection wire."

  - name: ndi_gui_docViewer
    type: class
    matlab_path: "+ndi/+gui/ndi_gui_docViewer.m"
    python_path: "ndi/gui/ndi_gui_docViewer.py"
