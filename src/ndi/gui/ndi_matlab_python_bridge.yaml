        type_python: "list[Any]"
        decision_log: "Exact match."
      - name: fullTable
        type_matlab: "cell"
        type_python: "list[list[str]]"
        decision_log: "Exact match."
      - name: tempDocuments
        type_matlab: "ndi.document[]"
        type_python: "list[Any]"
        decision_log: "Exact match."
      - name: tempTable
        type_matlab: "cell"
        type_python: "list[list[str]]"
        decision_log: "Exact match."
      - name: docs
        type_matlab: "cell array of ndi.document"
        type_python: "list[Any]"
        decision_log: "Exact match. Original docs reference."

    methods:
      - name: ndi_gui_docViewer
        kind: constructor
        input_arguments: []
        output_arguments:
