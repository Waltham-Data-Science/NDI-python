# ndi_matlab_python_bridge.yaml — src/ndi/probe/
# The Primary Contract for the ndi.probe namespace.

project_metadata:
  bridge_version: "1.1"
  naming_policy: "Strict MATLAB Mirror"
  indexing_policy: "Semantic Parity (1-based for user concepts, 0-based for internal data)"

# =========================================================================
# Standalone functions
# =========================================================================
functions:

  - name: initProbeTypeMap
    type: function
    matlab_path: "+ndi/+probe/+fun/initProbeTypeMap.m"
    python_path: "ndi/probe/__init__.py"
    input_arguments: []
    output_arguments:
      - name: type_map
        type_python: "dict[str, str]"
    decision_log: >
      Exact match. Loads probe type→class mapping from
      probetype2object.json. Returns a dict mapping type strings
      to class name strings.

  - name: getProbeTypeMap
    type: function
    matlab_path: "+ndi/+probe/+fun/getProbeTypeMap.m"
    python_path: "ndi/probe/__init__.py"
    input_arguments: []
    output_arguments:
      - name: type_map
        type_python: "dict[str, str]"
    decision_log: >
      Exact match. Returns the cached probe type→class mapping,
      loading it on first call via initProbeTypeMap().

# =========================================================================
# Classes
# =========================================================================
classes:

  # =========================================================================
  # ndi.probe  (base probe class, extends Element)
  # =========================================================================
  - name: probe
    type: class
    matlab_path: "+ndi/probe.m"
    python_path: "ndi/probe/__init__.py"
    python_class: "Probe"
    inherits: "ndi.element"

    properties:
      - name: name
        type_matlab: "char"
        type_python: "str"
        access: "GetAccess=public, SetAccess=protected"
        decision_log: "Inherited from Element. @property in Python."

      - name: reference
        type_matlab: "integer"
        type_python: "int"
        access: "GetAccess=public, SetAccess=protected"
        decision_log: "Inherited from Element. @property in Python."

      - name: type
        type_matlab: "char"
        type_python: "str"
        access: "GetAccess=public, SetAccess=protected"
        decision_log: "Inherited from Element. @property in Python."

    methods:
      # --- Constructor ---
      - name: probe
        kind: constructor
        input_arguments:
          - name: session
            type_matlab: "ndi.session"
            type_python: "Any | None"
          - name: name
            type_matlab: "char"
            type_python: "str"
            default: "''"
          - name: reference
            type_matlab: "integer"
            type_python: "int"
            default: "0"
          - name: type
            type_matlab: "char"
            type_python: "str"
            default: "''"
          - name: subject_id
            type_matlab: "char"
            type_python: "str"
            default: "''"
          - name: identifier
            type_matlab: "char"
            type_python: "str | None"
            default: "None"
          - name: document
            type_matlab: "ndi.document"
            type_python: "Any | None"
            default: "None"
        output_arguments:
          - name: probe_obj
            type_python: "Probe"
        decision_log: >
          Probes are always direct=False and have no underlying_element.
          These are hardcoded in the constructor.

      # --- EpochSet Overrides ---
      - name: buildepochtable
        input_arguments: []
        output_arguments:
          - name: et
            type_python: "list[dict[str, Any]]"
        decision_log: >
          Overrides Element. Scans all DAQ systems in the session and
          collects epochs where the epochprobemap matches this probe.

      - name: epochsetname
        input_arguments: []
        output_arguments:
          - name: name
            type_python: "str"
        decision_log: "Exact match. Returns 'probe: name | reference'."

      - name: issyncgraphroot
        input_arguments: []
        output_arguments:
          - name: b
            type_python: "bool"
        decision_log: >
          Always returns False for probes (continue traversal
          to underlying DAQ systems).

      # --- Probe-specific methods ---
      - name: probestring
        input_arguments: []
        output_arguments:
          - name: s
            type_python: "str"
        decision_log: "Exact match. Returns 'name | reference | type'."

      - name: epochprobemapmatch
        input_arguments:
          - name: epochprobemap
            type_matlab: "ndi.epoch.epochprobemap"
            type_python: "Any"
        output_arguments:
          - name: b
            type_python: "bool"
        decision_log: "Exact match. Checks name, reference, type."

      - name: getchanneldevinfo
        input_arguments:
          - name: epoch_number
            type_matlab: "integer"
            type_python: "int"
        output_arguments:
          - name: devinfo
            type_python: "dict[str, Any]"
        decision_log: >
          Semantic Parity: epoch_number is 1-indexed (user concept).
          Internally maps to 0-based index. Returns dict with
          daqsystem, device_epoch_id, epochprobemap.

      # --- DocumentService Override ---
      - name: newdocument
        input_arguments: []
        output_arguments:
          - name: doc
            type_python: "Any"
        decision_log: >
          Overrides Element. Sets element.direct=False for probes.

      - name: eq
        input_arguments:
          - name: other
            type_python: "Any"
        output_arguments:
          - name: b
            type_python: "bool"
        decision_log: "Inherited from Element. Mapped to Python __eq__ dunder method."

    static_methods:
      - name: buildmultipleepochtables
        input_arguments:
          - name: probes
            type_matlab: "ndi.probe array"
            type_python: "list[Probe]"
          - name: session
            type_matlab: "ndi.session"
            type_python: "Any"
        output_arguments:
          - name: result
            type_python: "dict[str, list[dict[str, Any]]]"
        decision_log: >
          Exact match. Builds epoch tables for multiple probes
          efficiently by loading DAQ systems once. Returns dict
          mapping probe.id to epoch table.

  # =========================================================================
  # ndi.probe.timeseries  (timeseries probe, extends Probe)
  # =========================================================================
  - name: timeseries
    type: class
    matlab_path: "+ndi/+probe/timeseries.m"
    python_path: "ndi/probe/timeseries.py"
    python_class: "ProbeTimeseries"
    inherits: "ndi.probe"

    methods:
      - name: readtimeseries
        input_arguments:
          - name: epoch
            type_matlab: "integer | char"
            type_python: "int | str | Any | None"
            default: "None"
          - name: t0
            type_matlab: "double"
            type_python: "float"
            default: "0.0"
          - name: t1
            type_matlab: "double"
            type_python: "float"
            default: "float('inf')"
          - name: timeref
            type_matlab: "ndi.time.timereference"
            type_python: "Any | None"
            default: "None"
        output_arguments:
          - name: data
            type_python: "np.ndarray | None"
          - name: t
            type_python: "np.ndarray | None"
          - name: timeref_out
            type_python: "Any | None"
        decision_log: >
          Exact match. Returns 3-tuple. If timeref is provided,
          uses syncgraph for time conversion. epoch_number is
          1-indexed (user concept).

      - name: readtimeseriesepoch
        input_arguments:
          - name: epoch
            type_matlab: "integer | char"
            type_python: "int | str"
          - name: t0
            type_matlab: "double"
            type_python: "float"
            default: "0.0"
          - name: t1
            type_matlab: "double"
            type_python: "float"
            default: "float('inf')"
        output_arguments:
          - name: data
            type_python: "np.ndarray | None"
          - name: t
            type_python: "np.ndarray | None"
          - name: timeref_out
            type_python: "Any | None"
        decision_log: >
          Base implementation returns (None, None, None).
          Subclasses override with format-specific reading.
          Semantic Parity: epoch_number is 1-indexed.

      - name: samplerate
        input_arguments:
          - name: epoch
            type_matlab: "integer | char"
            type_python: "int | str"
        output_arguments:
          - name: sr
            type_python: "float"
        decision_log: >
          Exact match. Returns sample rate in Hz, or -1 if
          not applicable. Semantic Parity: epoch is 1-indexed.

      - name: times2samples
        input_arguments:
          - name: epoch
            type_matlab: "integer | char"
            type_python: "int | str"
          - name: times
            type_matlab: "double array"
            type_python: "np.ndarray"
        output_arguments:
          - name: samples
            type_python: "np.ndarray"
        decision_log: >
          Exact match. Returns 1-indexed sample indices
          (Semantic Parity: samples are user-facing counting).

      - name: samples2times
        input_arguments:
          - name: epoch
            type_matlab: "integer | char"
            type_python: "int | str"
          - name: samples
            type_matlab: "double array"
            type_python: "np.ndarray"
        output_arguments:
          - name: times
            type_python: "np.ndarray"
        decision_log: >
          Exact match. Accepts 1-indexed sample indices
          (Semantic Parity: samples are user-facing counting).

  # =========================================================================
  # ndi.probe.timeseries.mfdaq  (MFDAQ timeseries probe)
  # =========================================================================
  - name: mfdaq
    type: class
    matlab_path: "+ndi/+probe/+timeseries/mfdaq.m"
    python_path: "ndi/probe/timeseries_mfdaq.py"
    python_class: "ProbeTimeseriesMFDAQ"
    inherits: "ndi.probe.timeseries"

    methods:
      - name: read_epochsamples
        input_arguments:
          - name: epoch
            type_matlab: "integer | char"
            type_python: "int | str"
          - name: s0
            type_matlab: "integer"
            type_python: "int"
          - name: s1
            type_matlab: "integer"
            type_python: "int"
        output_arguments:
          - name: data
            type_python: "np.ndarray | None"
          - name: t
            type_python: "np.ndarray | None"
          - name: timeref_out
            type_python: "Any | None"
        decision_log: >
          Exact match. Returns 3-tuple. Semantic Parity: epoch
          and sample indices (s0, s1) are 1-indexed.

      - name: readtimeseriesepoch
        input_arguments:
          - name: epoch
            type_matlab: "integer | char"
            type_python: "int | str"
          - name: t0
            type_matlab: "double"
            type_python: "float"
            default: "0.0"
          - name: t1
            type_matlab: "double"
            type_python: "float"
            default: "float('inf')"
        output_arguments:
          - name: data
            type_python: "np.ndarray | None"
          - name: t
            type_python: "np.ndarray | None"
          - name: timeref_out
            type_python: "Any | None"
        decision_log: >
          Overrides ProbeTimeseries. Converts t0/t1 to sample
          indices and delegates to read_epochsamples.

      - name: samplerate
        input_arguments:
          - name: epoch
            type_matlab: "integer | char"
            type_python: "int | str"
        output_arguments:
          - name: sr
            type_python: "float"
        decision_log: >
          Overrides ProbeTimeseries. Gets sample rate from
          underlying DAQ device.

      - name: getchanneldevinfo
        input_arguments:
          - name: epoch
            type_matlab: "integer | char"
            type_python: "int | str"
        output_arguments:
          - name: devinfo
            type_python: "tuple[Any, Any, Any, list[int]] | None"
        decision_log: >
          Overrides Probe.getchanneldevinfo. Returns 4-tuple
          (device, device_epoch, channeltype, channellist) or
          None. Semantic Parity: epoch is 1-indexed.

  # =========================================================================
  # ndi.probe.timeseries.stimulator  (Stimulus delivery probe)
  # =========================================================================
  - name: stimulator
    type: class
    matlab_path: "+ndi/+probe/+timeseries/stimulator.m"
    python_path: "ndi/probe/timeseries_stimulator.py"
    python_class: "ProbeTimeseriesStimulator"
    inherits: "ndi.probe.timeseries"

    methods:
      - name: stimulator
        kind: constructor
        input_arguments:
          - name: session
            type_matlab: "ndi.session"
            type_python: "Any | None"
            default: "None"
          - name: name
            type_matlab: "char"
            type_python: "str"
            default: "''"
          - name: reference
            type_matlab: "integer"
            type_python: "int"
            default: "1"
          - name: type
            type_matlab: "char"
            type_python: "str"
            default: "'stimulator'"
        output_arguments:
          - name: stim_obj
            type_python: "ProbeTimeseriesStimulator"
        decision_log: >
          Exact match. Defaults type to 'stimulator' and
          reference to 1.

      - name: readtimeseriesepoch
        input_arguments:
          - name: epoch
            type_matlab: "integer | char"
            type_python: "int | str"
          - name: t0
            type_matlab: "double"
            type_python: "float"
            default: "0.0"
          - name: t1
            type_matlab: "double"
            type_python: "float"
            default: "float('inf')"
        output_arguments:
          - name: data
            type_python: "dict[str, Any] | None"
          - name: times
            type_python: "dict[str, Any] | None"
          - name: timeref_out
            type_python: "Any | None"
        decision_log: >
          Overrides ProbeTimeseries. Returns structured data dicts
          instead of arrays. data has keys: stimid, parameters,
          analog. times has keys: stimon, stimoff, stimopenclose,
          stimevents. Semantic Parity: epoch is 1-indexed.

      - name: parse_marker_data
        input_arguments:
          - name: mk_timestamps
            type_matlab: "double array"
            type_python: "np.ndarray"
          - name: mk_values
            type_matlab: "double array"
            type_python: "np.ndarray"
        output_arguments:
          - name: result
            type_python: "dict[str, Any]"
        decision_log: >
          Exact match. Utility method to parse raw marker channel
          data into structured stimulus events. Returns dict with
          stimid, stimon, stimoff, stimopenclose arrays.
