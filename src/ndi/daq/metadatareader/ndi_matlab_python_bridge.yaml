# ndi_matlab_python_bridge.yaml — src/ndi/daq/metadatareader/
# The Primary Contract for the ndi.daq.metadatareader namespace.

project_metadata:
  bridge_version: "1.1"
  naming_policy: "Strict MATLAB Mirror"
  indexing_policy: "Semantic Parity (1-based for user concepts, 0-based for internal data)"

# =========================================================================
# Classes
# =========================================================================
classes:

  # =========================================================================
  # ndi.daq.metadatareader (base class)
  # =========================================================================
  - name: metadatareader
    type: class
    matlab_path: "+ndi/+daq/metadatareader.m"
    matlab_last_sync_hash: "fe64a9f5"
    python_path: "ndi/daq/metadatareader/__init__.py"
    python_class: "ndi_daq_metadatareader"
    inherits: "ndi.ido"

    properties:
      - name: tab_separated_file_parameter
        type_matlab: "char"
        type_python: "str"
        access: "property (read-only)"
        decision_log: "Exact match. Regex pattern for TSV file matching."

    methods:
      - name: metadatareader
        kind: constructor
        input_arguments:
          - name: tsv_pattern
            type_matlab: "char"
            type_python: "str"
            default: "''"
          - name: identifier
            type_python: "str | None"
            default: "None"
          - name: session
            type_python: "Any | None"
            default: "None"
          - name: document
            type_python: "Any | None"
            default: "None"
        output_arguments:
          - name: reader_obj
            type_python: "ndi_daq_metadatareader"
        decision_log: "Exact match."

      - name: readmetadata
        input_arguments:
          - name: epochfiles
            type_matlab: "cell array of char"
            type_python: "list[str]"
        output_arguments:
          - name: parameters
            type_python: "list[dict[str, Any]]"
        decision_log: >
          Exact match. Reads tab-separated file matching the pattern.
          Raises ValueError if no match or multiple matches.

      - name: readmetadatafromfile
        input_arguments:
          - name: filepath
            type_matlab: "char"
            type_python: "str"
        output_arguments:
          - name: parameters
            type_python: "list[dict[str, Any]]"
        decision_log: "Exact match. Reads metadata from a specific file."

      - name: readmetadata_ingested
        input_arguments:
          - name: epochfiles
            type_matlab: "cell array of char"
            type_python: "list[str]"
          - name: session
            type_matlab: "ndi.session"
            type_python: "Any"
        output_arguments:
          - name: parameters
            type_python: "list[dict[str, Any]]"
        decision_log: "Exact match."

      - name: get_ingested_document
        input_arguments:
          - name: epochfiles
            type_matlab: "cell array of char"
            type_python: "list[str]"
          - name: session
            type_matlab: "ndi.session"
            type_python: "Any"
        output_arguments:
          - name: doc
            type_python: "Any | None"
        decision_log: "Exact match."

      - name: ingest_epochfiles
        input_arguments:
          - name: epochfiles
            type_matlab: "cell array of char"
            type_python: "list[str]"
          - name: epoch_id
            type_matlab: "char"
            type_python: "str"
        output_arguments:
          - name: doc
            type_python: "Any"
        decision_log: "Exact match."

      - name: newdocument
        input_arguments: []
        output_arguments:
          - name: doc
            type_python: "Any"
        decision_log: "Exact match."

      - name: searchquery
        input_arguments: []
        output_arguments:
          - name: sq
            type_python: "Any"
        decision_log: "Exact match."

      - name: eq
        input_arguments:
          - name: other
            type_python: "Any"
        output_arguments:
          - name: b
            type_python: "bool"
        decision_log: "Mapped to Python __eq__ dunder method."

  # =========================================================================
