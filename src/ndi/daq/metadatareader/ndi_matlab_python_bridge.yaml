        output_arguments:
          - name: reader_obj
            type_python: "ndi_daq_metadatareader_NewStimStims"
        decision_log: "Exact match."

      - name: readmetadata
        input_arguments:
          - name: epochfiles
            type_matlab: "cell array of char"
            type_python: "list[str]"
        output_arguments:
          - name: parameters
            type_python: "list[dict[str, Any]]"
        decision_log: >
          Exact match. Reads from stims.mat via scipy.io.loadmat.
          Falls back to TSV reading from base class.

    protected_methods:
      - name: _find_stim_file
        input_arguments:
          - name: epochfiles
            type_python: "list[str]"
        output_arguments:
          - name: filepath
            type_python: "str | None"
