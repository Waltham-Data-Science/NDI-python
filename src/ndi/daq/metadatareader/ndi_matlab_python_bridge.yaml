    static_methods:
      - name: _extract_script_parameters
        input_arguments:
          - name: script_data
            type_python: "Any"
        output_arguments:
          - name: parameters
            type_python: "list[dict[str, Any]]"
        decision_log: >
          Python-specific. Extracts parameters from NewStim script struct.

