# ndi_matlab_python_bridge.yaml — src/ndi/app/
# The Primary Contract for the ndi.app namespace.

project_metadata:
  bridge_version: "1.1"
  naming_policy: "Strict MATLAB Mirror"
  indexing_policy: "Semantic Parity (1-based for user concepts, 0-based for internal data)"

# =========================================================================
# Classes
# =========================================================================
classes:

  # =========================================================================
  # ndi.app  (base class)
  # =========================================================================
  - name: app
    type: class
    matlab_path: "src/ndi/+ndi/app.m"
    python_path: "ndi/app/__init__.py"
    python_class: "ndi_app"
    inherits: "ndi.documentservice"

    properties:
      - name: session
        type_matlab: "ndi.session"
        type_python: "ndi_session | None"
        access: "protected set, public get"
        decision_log: "Exact match."

      - name: name
        type_matlab: "char"
        type_python: "str"
        access: "protected set, public get"
        decision_log: "Exact match."

    methods:
      - name: app
        kind: constructor
        input_arguments:
          - name: session
            type_matlab: "ndi.session (optional, via varargin)"
            type_python: "ndi_session | None"
            default: "None"
          - name: name
            type_matlab: "char (optional, via varargin)"
            type_python: "str"
            default: "'generic'"
        output_arguments:
          - name: app_obj
            type_python: "ndi_app"
        decision_log: >
          MATLAB uses varargin for optional session and name.
          Python uses explicit keyword arguments with defaults.

      - name: varappname
        input_arguments: []
        output_arguments:
          - name: an
            type_python: "str"
        decision_log: >
          Exact match. MATLAB uses regexprep for sanitization;
          Python uses re.sub. Both produce valid variable names.

      - name: version_url
        input_arguments: []
        output_arguments:
          - name: version
            type_python: "str"
          - name: url
            type_python: "str"
        decision_log: >
          Exact match. Returns 2-tuple (version, url).
          Both read from git; both fall back to defaults.

      - name: newdocument
        input_arguments: []
        output_arguments:
          - name: doc
            type_python: "ndi_document"
        decision_log: >
          Exact match. Creates 'app' document with name, version,
          url, os, os_version, interpreter, interpreter_version.
          MATLAB uses 'Matlab' for interpreter; Python uses 'Python'.

      - name: searchquery
        input_arguments: []
        output_arguments:
          - name: q
            type_python: "ndi_query"
        decision_log: >
          Exact match. Returns query for isa('app') & app.name matches.

  # =========================================================================
  # ndi.app.appdoc  (mixin)
  # =========================================================================
  - name: appdoc
    type: class
    matlab_path: "src/ndi/+ndi/+app/appdoc.m"
    python_path: "ndi/app/appdoc.py"
    python_class: "ndi_app_appdoc"

    properties:
      - name: doc_types
        type_matlab: "cell array of char"
        type_python: "list[str]"
        decision_log: "Exact match."

      - name: doc_document_types
        type_matlab: "cell array of char"
        type_python: "list[str]"
        decision_log: "Exact match."

      - name: doc_session
        type_matlab: "ndi.session"
        type_python: "Any"
        decision_log: "Exact match."

    methods:
      - name: appdoc
        kind: constructor
        input_arguments:
          - name: doc_types
            type_matlab: "cell array"
            type_python: "list[str] | None"
          - name: doc_document_types
            type_matlab: "cell array"
            type_python: "list[str] | None"
          - name: doc_session
            type_matlab: "ndi.session"
            type_python: "Any"
            default: "None"
        output_arguments:
          - name: appdoc_obj
            type_python: "ndi_app_appdoc"
        decision_log: "Exact match."

      - name: add_appdoc
        input_arguments:
          - name: appdoc_type
            type_matlab: "char"
            type_python: "str"
          - name: appdoc_struct
            type_matlab: "struct | char | ndi.document | empty"
            type_python: "Any"
            default: "None"
          - name: docexistsaction
            type_matlab: "char"
            type_python: "DocExistsAction"
            default: "DocExistsAction.ERROR"
        output_arguments:
          - name: doc
            type_matlab: "cell array of ndi.document"
            type_python: "list[ndi_document]"
        decision_log: >
          Exact match. MATLAB accepts struct/char/document/empty for
          appdoc_struct; Python accepts dict or None. MATLAB returns
          cell array; Python returns list. DocExistsAction enum mirrors
          MATLAB string options.

      - name: struct2doc
        input_arguments:
          - name: appdoc_type
            type_matlab: "char"
            type_python: "str"
          - name: appdoc_struct
            type_matlab: "struct"
            type_python: "dict"
        output_arguments:
          - name: doc
            type_python: "ndi_document | None"
        decision_log: >
          Exact match. Base class returns empty/None.
          Subclasses must override.

      - name: doc2struct
        input_arguments:
          - name: appdoc_type
            type_matlab: "char"
            type_python: "str"
          - name: doc
            type_matlab: "ndi.document"
            type_python: "ndi_document"
        output_arguments:
          - name: appdoc_struct
            type_python: "dict"
        decision_log: >
          Exact match. Reads property_list_name from document.

      - name: defaultstruct_appdoc
        input_arguments:
          - name: appdoc_type
            type_matlab: "char"
            type_python: "str"
        output_arguments:
          - name: appdoc_struct
            type_python: "dict"
        decision_log: "Exact match."

      - name: loaddata_appdoc
        input_arguments:
          - name: appdoc_type
            type_matlab: "char"
            type_python: "str"
        output_arguments:
          - name: data
            type_python: "Any"
        decision_log: >
          Exact match. Base class returns empty/None.

      - name: clear_appdoc
        input_arguments:
          - name: appdoc_type
            type_matlab: "char"
            type_python: "str"
        output_arguments:
          - name: b
            type_matlab: "logical"
            type_python: "bool"
        decision_log: >
          Exact match. Returns True/1 if document was found and removed.

      - name: find_appdoc
        input_arguments:
          - name: appdoc_type
            type_matlab: "char"
            type_python: "str"
        output_arguments:
          - name: doc
            type_matlab: "cell array of ndi.document"
            type_python: "list[ndi_document]"
        decision_log: >
          Exact match. Base class returns empty/[].

      - name: isvalid_appdoc_struct
        input_arguments:
          - name: appdoc_type
            type_matlab: "char"
            type_python: "str"
          - name: appdoc_struct
            type_matlab: "struct"
            type_python: "dict"
        output_arguments:
          - name: b
            type_matlab: "logical"
            type_python: "bool"
          - name: errormsg
            type_matlab: "char"
            type_python: "str"
        decision_log: >
          DISCREPANCY FIXED: MATLAB returns [b, errormsg] 2-tuple.
          Python was returning only bool. Updated Python to return
          tuple[bool, str] to match MATLAB.

      - name: isequal_appdoc_struct
        input_arguments:
          - name: appdoc_type
            type_matlab: "char"
            type_python: "str"
          - name: appdoc_struct1
            type_matlab: "struct"
            type_python: "dict"
          - name: appdoc_struct2
            type_matlab: "struct"
            type_python: "dict"
        output_arguments:
          - name: b
            type_python: "bool"
        decision_log: "Exact match."

