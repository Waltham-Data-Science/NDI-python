      - name: epoch
        type_matlab: "char"
        type_python: "str | None"
        access: "GetAccess=public, SetAccess=protected"
        decision_log: >
          Implemented as @property in Python. Required when
          clocktype is DEV_LOCAL_TIME.

      - name: time
        type_matlab: "double"
        type_python: "float | None"
        access: "GetAccess=public, SetAccess=protected"
        decision_log: "Implemented as @property in Python."

      - name: session_id
        type_matlab: "char"
        type_python: "str"
        access: "GetAccess=public, SetAccess=protected"
        decision_log: >
          Implemented as @property in Python. Extracted from
          referent if not explicitly provided.

    methods:
      - name: timereference
        kind: constructor
        input_arguments:
          - name: referent
            type_matlab: "ndi.epoch.epochset"
            type_python: "Any"
          - name: clocktype
            type_matlab: "ndi.time.clocktype | char"
            type_python: "ClockType | str"
          - name: epoch
            type_matlab: "char"
            type_python: "str | None"
            default: "None"
          - name: time
            type_matlab: "double"
            type_python: "float | None"
            default: "None"
          - name: session_id
            type_matlab: "char"
            type_python: "str | None"
            default: "None"
        output_arguments:
          - name: tr_obj
            type_python: "TimeReference"
        decision_log: >
          Exact match. Accepts clocktype as string or enum.
          Raises ValueError if DEV_LOCAL_TIME without epoch.

      - name: to_struct
        input_arguments: []
        output_arguments:
          - name: trs
            type_python: "TimeReferenceStruct"
        decision_log: >
          MATLAB: ndi_timereference2struct. Python uses to_struct().
          Converts to a serializable struct without live objects.

      - name: to_dict
        input_arguments: []
        output_arguments:
          - name: data
            type_python: "dict"
        decision_log: "Python-specific serialization method."

      - name: eq
        input_arguments:
          - name: other
            type_python: "Any"
        output_arguments:
          - name: b
            type_python: "bool"
        decision_log: >
          Mapped to Python __eq__. Compares session_id, clocktype,
          epoch, and time. Referent comparison intentionally omitted.

    static_methods:
      - name: from_struct
        kind: classmethod
        input_arguments:
          - name: session
            type_matlab: "ndi.session"
            type_python: "Any"
          - name: struct
            type_python: "TimeReferenceStruct"
        output_arguments:
          - name: tr_obj
            type_python: "TimeReference"
        decision_log: >
          MATLAB: ndi_timereferencestruct2timereference. Python
          uses classmethod from_struct(). Resolves referent from
