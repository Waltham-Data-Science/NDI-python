# ndi_matlab_python_bridge.yaml — src/ndi/time/
# The Primary Contract for the ndi.time namespace.

project_metadata:
  bridge_version: "1.1"
  naming_policy: "Strict MATLAB Mirror"
  indexing_policy: "Semantic Parity (1-based for user concepts, 0-based for internal data)"

# =========================================================================
# Classes
# =========================================================================
classes:

  # =========================================================================
  # ndi.time.clocktype  (enumeration)
  # =========================================================================
  - name: clocktype
    type: class
    matlab_path: "+ndi/+time/clocktype.m"
    matlab_last_sync_hash: "821b5af5"
    python_path: "ndi/time/clocktype.py"
    python_class: "ClockType"

    properties:
      - name: UTC
        type_matlab: "char"
        type_python: "str"
        decision_log: "Enum member. Value 'utc'."

      - name: APPROX_UTC
        type_matlab: "char"
        type_python: "str"
        decision_log: "Enum member. Value 'approx_utc'."

      - name: EXP_GLOBAL_TIME
        type_matlab: "char"
        type_python: "str"
        decision_log: "Enum member. Value 'exp_global_time'."

      - name: APPROX_EXP_GLOBAL_TIME
        type_matlab: "char"
        type_python: "str"
        decision_log: "Enum member. Value 'approx_exp_global_time'."

      - name: DEV_GLOBAL_TIME
        type_matlab: "char"
        type_python: "str"
        decision_log: "Enum member. Value 'dev_global_time'."

      - name: APPROX_DEV_GLOBAL_TIME
        type_matlab: "char"
        type_python: "str"
        decision_log: "Enum member. Value 'approx_dev_global_time'."

      - name: DEV_LOCAL_TIME
        type_matlab: "char"
        type_python: "str"
        decision_log: "Enum member. Value 'dev_local_time'."

      - name: NO_TIME
        type_matlab: "char"
        type_python: "str"
        decision_log: "Enum member. Value 'no_time'."

      - name: INHERITED
        type_matlab: "char"
        type_python: "str"
        decision_log: "Enum member. Value 'inherited'."

    methods:
      - name: from_string
        kind: classmethod
        input_arguments:
          - name: type_str
            type_matlab: "char"
            type_python: "str"
        output_arguments:
          - name: ct
            type_python: "ClockType"
        decision_log: >
          Python-specific factory. MATLAB uses constructor.
          Case-insensitive matching.

      - name: needs_epoch
        input_arguments: []
        output_arguments:
          - name: b
            type_python: "bool"
        decision_log: >
          Exact match. Returns True only for DEV_LOCAL_TIME.

      - name: is_global
        input_arguments: []
        output_arguments:
          - name: b
            type_python: "bool"
        decision_log: >
          Exact match. Returns True for UTC, APPROX_UTC,
          EXP_GLOBAL_TIME, APPROX_EXP_GLOBAL_TIME,
          DEV_GLOBAL_TIME, APPROX_DEV_GLOBAL_TIME.

      - name: epochgraph_edge
        input_arguments:
          - name: other
            type_matlab: "ndi.time.clocktype"
            type_python: "ClockType"
        output_arguments:
          - name: cost
            type_python: "float"
          - name: mapping
            type_python: "TimeMapping | None"
        decision_log: >
          Exact match. Returns 2-tuple (cost, mapping).
          Valid transitions (cost=100, identity mapping):
          utc→utc, utc→approx_utc, exp_global→exp_global,
          exp_global→approx_exp_global, dev_global→dev_global,
          dev_global→approx_dev_global.

    static_methods:
      - name: assert_global
        input_arguments:
          - name: clocktype
            type_python: "ClockType"
        output_arguments: []
        decision_log: >
          Exact match. Raises AssertionError if clock type is
          not global.

  # =========================================================================
  # ndi.time.timemapping
  # =========================================================================
  - name: timemapping
    type: class
    matlab_path: "+ndi/+time/timemapping.m"
    matlab_last_sync_hash: "89d6b45f"
    python_path: "ndi/time/timemapping.py"
    python_class: "TimeMapping"

    properties:
      - name: mapping
        type_matlab: "double array"
        type_python: "np.ndarray"
        decision_log: >
          Polynomial coefficients [a_n, ..., a_1, a_0].
          Implemented as @property in Python.

      - name: scale
        type_matlab: "double"
        type_python: "float"
        decision_log: >
          Computed property. First coefficient for linear mappings.

      - name: shift
        type_matlab: "double"
        type_python: "float"
        decision_log: >
          Computed property. Last coefficient for linear mappings.

    methods:
      - name: timemapping
        kind: constructor
        input_arguments:
          - name: mapping
            type_matlab: "double array"
            type_python: "list[float] | np.ndarray | None"
            default: "None"
        output_arguments:
          - name: tm_obj
            type_python: "TimeMapping"
        decision_log: >
          Exact match. Default is [1, 0] (identity). Tests
          mapping with t_in=0 on construction.

      - name: map
        input_arguments:
          - name: t_in
            type_matlab: "double"
            type_python: "float | np.ndarray"
        output_arguments:
          - name: t_out
            type_python: "float | np.ndarray"
        decision_log: >
          Exact match. Applies polynomial via numpy.polyval.

      - name: inverse
        input_arguments: []
        output_arguments:
          - name: tm_inv
            type_python: "TimeMapping"
        decision_log: >
          Exact match. Only supports linear mappings. Raises
          ValueError for higher-order or zero-scale mappings.

      - name: compose
        input_arguments:
          - name: other
            type_matlab: "ndi.time.timemapping"
            type_python: "TimeMapping"
        output_arguments:
          - name: tm_composed
            type_python: "TimeMapping"
        decision_log: >
          Exact match. Composes self then other. Only supports
          linear mappings. Raises ValueError for higher-order.

      - name: eq
        input_arguments:
          - name: other
            type_python: "Any"
        output_arguments:
          - name: b
            type_python: "bool"
        decision_log: >
          Mapped to Python __eq__. Uses numpy.allclose for
          floating-point comparison.

      - name: to_dict
        input_arguments: []
        output_arguments:
          - name: data
            type_python: "dict"
        decision_log: "Python-specific serialization method."

      - name: from_dict
        kind: classmethod
        input_arguments:
          - name: data
            type_python: "dict"
        output_arguments:
          - name: tm_obj
            type_python: "TimeMapping"
        decision_log: "Python-specific factory method."

    static_methods:
      - name: identity
        kind: classmethod
        input_arguments: []
        output_arguments:
          - name: tm_obj
            type_python: "TimeMapping"
        decision_log: "Exact match. Returns TimeMapping([1, 0])."

      - name: linear
        kind: classmethod
        input_arguments:
          - name: scale
            type_matlab: "double"
            type_python: "float"
            default: "1.0"
          - name: shift
            type_matlab: "double"
            type_python: "float"
            default: "0.0"
        output_arguments:
          - name: tm_obj
            type_python: "TimeMapping"
        decision_log: >
          Python-specific convenience factory. Creates
          TimeMapping([scale, shift]).

