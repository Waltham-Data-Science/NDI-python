# ndi_matlab_python_bridge.yaml — src/ndi/cloud/api/
# The Primary Contract for the ndi.cloud.api namespace.
#
# Covers: datasets.py, documents.py, files.py, users.py, compute.py, _validators.py

project_metadata:
  bridge_version: "1.1"
  naming_policy: "Strict MATLAB Mirror"
  indexing_policy: "N/A (no user-facing counting)"

# =============================================================================
# Infrastructure (Python-only)
# =============================================================================
infrastructure:
  - name: _validators.py
    type: module
    python_path: "ndi/cloud/api/_validators.py"
    decision_log: >
      Python-only Pydantic validators (CloudId, NonEmptyStr, PageNumber,
      PageSize, Scope, FilePath). MATLAB uses arguments blocks for validation.

  - name: _resolve_org_id
    type: internal_helper
    python_path: "ndi/cloud/api/datasets.py"
    decision_log: "Python-only helper to resolve org_id from client config."

  - name: _coerce_search_structure
    type: internal_helper
    python_path: "ndi/cloud/api/documents.py"
    decision_log: "Python-only helper to normalize search structures."

