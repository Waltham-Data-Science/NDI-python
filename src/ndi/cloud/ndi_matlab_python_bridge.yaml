        type_python: "str"
      - name: org_id
        type_python: "str"
    decision_log: >
      Updated 2026-05-11 to require a non-empty organization id
      (matches MATLAB commit 5c4352eeac which made org id required for
      cached auth). MATLAB places this in +internal; Python places it
      in auth.py. Name exact match.

