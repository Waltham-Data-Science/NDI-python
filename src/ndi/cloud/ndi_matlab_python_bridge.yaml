# ndi_matlab_python_bridge.yaml — src/ndi/cloud/
# The Primary Contract for the ndi.cloud root namespace.
#
# Covers: auth.py, config.py, client.py, exceptions.py, orchestration.py,
#         download.py, upload.py, filehandler.py, internal.py, profile.py

project_metadata:
  bridge_version: "1.1"
  naming_policy: "Strict MATLAB Mirror"
  indexing_policy: "N/A (no user-facing counting)"

# =============================================================================
# Infrastructure (Python-only — no MATLAB equivalent)
# =============================================================================
infrastructure:
  - name: CloudConfig
    type: class
    python_path: "ndi/cloud/config.py"
    decision_log: >
      Python-only configuration container. MATLAB uses environment variables
      and ndi_globals directly; Python wraps them in a dataclass.

  - name: CloudClient
    type: class
    python_path: "ndi/cloud/client.py"
    decision_log: >
      Python-only HTTP client. MATLAB uses webread/webwrite/call.m;
      Python wraps requests.ndi_session for all REST calls.

  - name: APIResponse
    type: class
    python_path: "ndi/cloud/client.py"
    decision_log: >
      Python-only response wrapper. MATLAB returns raw structs/cells
      from webread; Python normalizes into APIResponse.

  - name: _auto_client
    type: decorator
    python_path: "ndi/cloud/client.py"
    decision_log: >
      Python-only decorator making the 'client' parameter optional.
      MATLAB functions implicitly use the environment for auth.

  - name: CloudError
    type: exception
    python_path: "ndi/cloud/exceptions.py"
    decision_log: "Python-only base exception class for cloud operations."

  - name: CloudAuthError
    type: exception
    python_path: "ndi/cloud/exceptions.py"
    decision_log: "Python-only. MATLAB raises generic errors."

  - name: CloudAPIError
    type: exception
    python_path: "ndi/cloud/exceptions.py"
    decision_log: "Python-only. MATLAB raises generic errors with status codes in message."

  - name: CloudNotFoundError
    type: exception
    python_path: "ndi/cloud/exceptions.py"
    decision_log: "Python-only 404 exception."

  - name: CloudSyncError
    type: exception
    python_path: "ndi/cloud/exceptions.py"
    decision_log: "Python-only sync exception."

  - name: CloudUploadError
    type: exception
    python_path: "ndi/cloud/exceptions.py"
    decision_log: "Python-only upload exception."

# =============================================================================
# Functions — Auth (auth.py)
# Maps to: +cloud/+api/+auth/ and +cloud/+internal/
# =============================================================================
functions:

  # --- auth.py functions ---
  - name: authenticate
    matlab_path: "+ndi/+cloud/authenticate.m"
    matlab_last_sync_hash: "2566fe4d"
    python_path: "ndi/cloud/auth.py"
    input_arguments:
      - name: config
        type_matlab: "N/A (uses env)"
        type_python: "CloudConfig | None"
        default: "None"
    output_arguments:
      - name: token
        type_python: "str"
      - name: organizationID
        type_python: "str"
    decision_log: >
      Synchronized with MATLAB main as of 2026-05-11 (matlab HEAD
      2566fe4d). Now requires both token AND organization_id to be
      populated before treating a cached login as valid (mirrors
      commit 5c4352eeac). The local JWT exp pre-check is delegated to
      isTokenExpired (extracted in commit 9562eb28e7). Organization-id
      extraction (auth._extract_first_organization_id) accepts dict,
      list-of-dicts, or single dict, and warns when multiple
      organizations are present.

  - name: testLogin
    matlab_path: "+ndi/+cloud/testLogin.m"
    matlab_last_sync_hash: "2566fe4d"
    python_path: "ndi/cloud/auth.py"
    input_arguments:
      - name: user_name
        type_matlab: "string"
        type_python: "str | None"
        default: "None"
      - name: use_ui_login
        type_matlab: "logical"
        type_python: "bool"
        default: "False"
      - name: verbose
        type_matlab: "logical"
        type_python: "bool"
        default: "False"
    output_arguments:
      - name: is_good
        type_python: "bool"
    decision_log: >
      Ported from MATLAB main as of 2026-05-11 (matlab HEAD 2566fe4d).
      Three-attempt cascade: (1) probe NDI_CLOUD_TOKEN via direct GET
      /users/me bypassing wrappers (to avoid silent re-auth swapping
      the token mid-call); (2) if NDI_CLOUD_USERNAME / NDI_CLOUD_PASSWORD
      are set, do a silent login and re-probe; (3) if env credentials
      are absent, return False (Python has no GUI login -- use_ui_login
      is accepted for parity but never escalates to UI). Local JWT
      validity check is performed before any HTTP call. Verbose mode
      prints step-by-step diagnostics. UI step (MATLAB ndi.cloud.uilogin)
      is intentionally omitted from the Python port; that is part of the
      profileEditor GUI workstream.

  - name: login
    matlab_path: "+ndi/+cloud/+api/+auth/login.m"
    matlab_last_sync_hash: "9b75c0fe"
    python_path: "ndi/cloud/auth.py"
    input_arguments:
      - name: email
        type_matlab: "char"
        type_python: "str | None"
      - name: password
        type_matlab: "char"
        type_python: "str | None"
      - name: config
        type_python: "CloudConfig | None"
        default: "None"
    output_arguments:
      - name: config
        type_python: "CloudConfig"
    decision_log: "Exact match."

  - name: logout
    matlab_path: "+ndi/+cloud/logout.m"
    matlab_last_sync_hash: "23a1f8d8"
    python_path: "ndi/cloud/auth.py"
    input_arguments:
      - name: config
        type_python: "CloudConfig | None"
        default: "None"
    output_arguments: []
    decision_log: "Exact match."

  - name: changePassword
    matlab_path: "+ndi/+cloud/+api/+auth/changePassword.m"
    matlab_last_sync_hash: "9b75c0fe"
    python_path: "ndi/cloud/auth.py"
    input_arguments:
      - name: old_password
        type_matlab: "char"
        type_python: "str"
      - name: new_password
        type_matlab: "char"
        type_python: "str"
      - name: config
        type_python: "CloudConfig | None"
        default: "None"
    output_arguments:
      - name: success
        type_python: "bool"
    decision_log: "Exact match."

  - name: resetPassword
    matlab_path: "+ndi/+cloud/+api/+auth/resetPassword.m"
    matlab_last_sync_hash: "9b75c0fe"
    python_path: "ndi/cloud/auth.py"
    input_arguments:
      - name: email
        type_matlab: "char"
        type_python: "str"
      - name: config
        type_python: "CloudConfig | None"
        default: "None"
    output_arguments:
      - name: success
        type_python: "bool"
    decision_log: "Exact match."

  - name: verifyUser
    matlab_path: "+ndi/+cloud/+api/+auth/verifyUser.m"
    matlab_last_sync_hash: "9b75c0fe"
    python_path: "ndi/cloud/auth.py"
    input_arguments:
      - name: email
        type_matlab: "char"
        type_python: "str"
      - name: confirmation_code
        type_matlab: "char"
        type_python: "str"
      - name: config
        type_python: "CloudConfig | None"
