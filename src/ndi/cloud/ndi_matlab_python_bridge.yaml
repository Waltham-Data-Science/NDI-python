  # --- profile.py (singleton manager for cloud login profiles) ---
  - name: profile
    matlab_path: "+ndi/+cloud/profile.m"
    matlab_last_sync_hash: "2566fe4d"
    python_path: "ndi/cloud/profile.py"
    input_arguments: []
    output_arguments: []
    decision_log: >
      Ported from MATLAB main as of 2026-05-11 (matlab HEAD 2566fe4d,
      commit 970b6854b1). MATLAB exposes ndi.cloud.profile as a singleton
      classdef with static methods (add, remove, getCurrent, setCurrent,
      getDefault, setDefault, getPassword, setPassword, getStage,
      setStage, switchProfile, etc.).  Python ports the same surface as
      module-level functions in ndi.cloud.profile, backed by a
      _ProfileSingleton dataclass.  Backends: keyring (preferred,
      mirrors MATLAB's "vault"), aes (mirrors MATLAB's AES file
      backend), or memory (test-only).  Profile metadata persists to
      ~/.ndi/NDI_Cloud_Profiles.json; AES ciphertext (when used) goes
      to NDI_Cloud_Secrets.json in the same directory.  Python uses
      Python-idiomatic snake_case for the public functions
      (list_profiles, get_current, set_current, set_default,
      switch_profile, use_backend) since these are convenience helpers,
      not strict API mirrors; ProfileEntry field names (UID, Nickname,
      Email, Stage, PasswordSecret) match MATLAB exactly so the on-disk
      JSON is interchangeable.  GUI editor (MATLAB ndi.gui.profileEditor)
      is intentionally NOT ported -- separate workstream.

