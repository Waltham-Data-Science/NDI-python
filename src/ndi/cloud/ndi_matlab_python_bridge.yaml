    output_arguments:
      - name: success
        type_python: "bool"
    decision_log: "Exact match."

  - name: resendConfirmation
    matlab_path: "+ndi/+cloud/+api/+auth/resendConfirmation.m"
    matlab_last_sync_hash: "43de1651"
    python_path: "ndi/cloud/auth.py"
    input_arguments:
      - name: email
        type_matlab: "char"
        type_python: "str"
      - name: config
        type_python: "CloudConfig | None"
        default: "None"
