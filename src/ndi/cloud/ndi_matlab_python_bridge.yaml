  - name: decodeJwt
    matlab_path: "+ndi/+cloud/+internal/decodeJwt.m"
    matlab_last_sync_hash: "7ab96514"
    python_path: "ndi/cloud/auth.py"
    input_arguments:
      - name: token
        type_matlab: "char"
        type_python: "str"
    output_arguments:
      - name: payload
        type_python: "dict"
    decision_log: >
      MATLAB places this in +internal; Python places it in auth.py
      since it is tightly coupled with authentication logic. Name exact match.

  - name: getTokenExpiration
    matlab_path: "+ndi/+cloud/+internal/getTokenExpiration.m"
    matlab_last_sync_hash: "7ab96514"
    python_path: "ndi/cloud/auth.py"
    input_arguments:
      - name: token
        type_matlab: "char"
        type_python: "str"
    output_arguments:
      - name: expiration
        type_python: "datetime"
    decision_log: >
      MATLAB places this in +internal; Python places it in auth.py.
      Name exact match.

  - name: isTokenExpired
    matlab_path: "+ndi/+cloud/+internal/isTokenExpired.m"
    matlab_last_sync_hash: "2566fe4d"
    python_path: "ndi/cloud/auth.py"
    input_arguments:
      - name: token
        type_matlab: "char"
        type_python: "str"
    output_arguments:
      - name: expired
        type_python: "bool"
    decision_log: >
      Ported from MATLAB main as of 2026-05-11 (matlab HEAD 2566fe4d,
      original commit 716442b940). Local-only JWT exp check; True for
      empty / malformed / expired tokens. MATLAB places this in
      +internal; Python places it in auth.py alongside the other JWT
      helpers. The pre-existing Python verifyToken is now defined in
      terms of `not isTokenExpired`.

  - name: verifyToken
    matlab_path: "N/A"
    python_path: "ndi/cloud/auth.py"
    input_arguments:
      - name: token
        type_python: "str"
    output_arguments:
      - name: valid
        type_python: "bool"
    decision_log: "Python-only convenience. No MATLAB equivalent."

  - name: getActiveToken
    matlab_path: "+ndi/+cloud/+internal/getActiveToken.m"
    matlab_last_sync_hash: "2566fe4d"
    python_path: "ndi/cloud/auth.py"
    input_arguments:
      - name: config
        type_python: "CloudConfig | None"
        default: "None"
    output_arguments:
