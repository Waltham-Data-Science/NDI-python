      Python-only dispatcher that routes to the specific sync operation
      based on SyncMode. MATLAB uses syncDataset at the top level.

  - name: deleteLocalDocuments
    matlab_path: "+ndi/+cloud/+sync/+internal/deleteLocalDocuments.m"
