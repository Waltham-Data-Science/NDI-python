        type_python: "str"
      - name: ndi_to_api
        type_python: "dict[str, str]"
      - name: ids_to_download
        type_python: "set[str]"
      - name: client
        type_python: "CloudClient | None"
        default: "None"
    output_arguments:
      - name: docs
        type_python: "list[dict[str, Any]]"
      - name: failed_ids
        type_python: "list[str]"
    decision_log: >
      MATLAB places this in +sync/+internal. Python places it in
      operations.py. Exact name match.

# =============================================================================
# Not-yet-ported MATLAB functions
# =============================================================================
not_yet_ported:

  - name: Constants
    matlab_path: "+ndi/+cloud/+sync/+internal/Constants.m"
    status: not_yet_ported
    decision_log: "MATLAB sync constants class. Values may be inlined in Python."

  - name: deleteRemoteDocuments
    matlab_path: "+ndi/+cloud/+sync/+internal/deleteRemoteDocuments.m"
    status: not_yet_ported
    decision_log: >
      MATLAB internal for removing remote documents during mirror operations.
      Python sync operations handle this inline via API calls.

  - name: createSyncIndexStruct
    matlab_path: "+ndi/+cloud/+sync/+internal/+index/createSyncIndexStruct.m"
    status: not_applicable
    decision_log: >
      MATLAB struct constructor. Python uses SyncIndex dataclass
      with default field values instead.

  - name: getIndexFilepath
    matlab_path: "+ndi/+cloud/+sync/+internal/+index/getIndexFilepath.m"
    status: not_applicable
    decision_log: >
      MATLAB path resolver. Python handles this inside
      SyncIndex.read() and SyncIndex.write() methods.
