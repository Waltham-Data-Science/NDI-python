      - name: doc_ids
        type_matlab: "string array"
        type_python: "set[str]"
    output_arguments:
      - name: deleted_ids
        type_python: "list[str]"
    decision_log: >
      MATLAB places this in +sync/+internal. Python places it in
      operations.py. Exact name match.

  - name: downloadNdiDocuments
    matlab_path: "+ndi/+cloud/+sync/+internal/downloadNdiDocuments.m"
    python_path: "ndi/cloud/sync/operations.py"
    input_arguments:
