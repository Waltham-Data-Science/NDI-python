# =============================================================================
functions:

  - name: uploadNew
    matlab_path: "+ndi/+cloud/+sync/uploadNew.m"
    python_path: "ndi/cloud/sync/operations.py"
    input_arguments:
      - name: dataset_path
        type_matlab: "char"
        type_python: "str"
      - name: cloud_dataset_id
        type_matlab: "char"
        type_python: "str"
      - name: options
        type_matlab: "ndi.cloud.sync.SyncOptions"
        type_python: "SyncOptions | None"
        default: "None"
      - name: client
        type_python: "CloudClient | None"
        default: "None"
    output_arguments:
      - name: result
        type_python: "dict[str, Any]"
    decision_log: "Exact match."

