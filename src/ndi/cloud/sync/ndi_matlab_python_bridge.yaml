# ndi_matlab_python_bridge.yaml — src/ndi/cloud/sync/
# The Primary Contract for the ndi.cloud.sync namespace.
#
# Covers: mode.py, operations.py, index.py

project_metadata:
  bridge_version: "1.1"
  naming_policy: "Strict MATLAB Mirror"
  indexing_policy: "N/A (no user-facing counting)"

# =============================================================================
# Classes — mode.py
# Maps to: +cloud/+sync/+enum/SyncMode.m and +cloud/+sync/SyncOptions.m
# =============================================================================
classes:

  - name: SyncMode
    type: enum
    matlab_path: "+ndi/+cloud/+sync/+enum/SyncMode.m"
    python_path: "ndi/cloud/sync/mode.py"
    python_class: "SyncMode"
    members:
      - name: DOWNLOAD_NEW
        value: "download_new"
      - name: MIRROR_FROM_REMOTE
        value: "mirror_from_remote"
      - name: UPLOAD_NEW
        value: "upload_new"
      - name: MIRROR_TO_REMOTE
        value: "mirror_to_remote"
      - name: TWO_WAY_SYNC
        value: "two_way_sync"
    decision_log: >
      MATLAB uses PascalCase enum values (DownloadNew, UploadNew, etc).
      Python uses UPPER_SNAKE for enum members (DOWNLOAD_NEW) with
      lowercase string values matching MATLAB's string representation.

  - name: SyncOptions
    type: dataclass
    matlab_path: "+ndi/+cloud/+sync/SyncOptions.m"
    python_path: "ndi/cloud/sync/mode.py"
    python_class: "SyncOptions"
    properties:
      - name: sync_files
        type_matlab: "logical"
        type_python: "bool"
        default: "False"
      - name: verbose
        type_matlab: "logical"
        type_python: "bool"
        default: "True"
      - name: dry_run
        type_matlab: "logical"
        type_python: "bool"
        default: "False"
      - name: file_upload_strategy
        type_python: "str"
        default: "'batch'"
    decision_log: "Exact match for shared fields."

  - name: SyncIndex
    type: dataclass
    matlab_path: "+ndi/+cloud/+sync/+internal/+index/"
    python_path: "ndi/cloud/sync/index.py"
    python_class: "SyncIndex"
    properties:
      - name: local_doc_ids_last_sync
        type_python: "list[str]"
      - name: remote_doc_ids_last_sync
        type_python: "list[str]"
      - name: last_sync_timestamp
        type_python: "str"
    methods:
      - name: read
        kind: classmethod
        matlab_equivalent: "readSyncIndex"
        input_arguments:
          - name: dataset_path
            type_python: "Path"
        output_arguments:
          - name: index
            type_python: "SyncIndex"
        decision_log: >
          MATLAB has readSyncIndex as standalone function.
          Python wraps it as a classmethod on SyncIndex dataclass.

      - name: write
        matlab_equivalent: "writeSyncIndex"
        input_arguments:
          - name: dataset_path
            type_python: "Path"
        output_arguments: []
        decision_log: >
          MATLAB has writeSyncIndex as standalone function.
          Python wraps it as an instance method.

      - name: update
        matlab_equivalent: "updateSyncIndex"
        input_arguments:
          - name: local_ids
            type_python: "list[str]"
          - name: remote_ids
            type_python: "list[str]"
        output_arguments: []
        decision_log: >
          MATLAB has updateSyncIndex as standalone function.
          Python wraps it as an instance method.

