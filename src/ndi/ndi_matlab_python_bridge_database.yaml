# ndi_matlab_python_bridge.yaml — ndi.database (core class)
# The Primary Contract for the ndi.database namespace.

project_metadata:
  bridge_version: "1.1"
  naming_policy: "Strict MATLAB Mirror"
  indexing_policy: "Semantic Parity (1-based for user concepts, 0-based for internal data)"

# =========================================================================
# Classes
# =========================================================================
classes:

  # =========================================================================
  # ndi.database  (abstract base class)
  # =========================================================================
  - name: database
    type: class
    matlab_path: "+ndi/database.m"
    matlab_last_sync_hash: "ad81fd7a"
    python_path: "ndi/database.py"
    python_class: "ndi_database"

    properties:
      - name: path
        type_matlab: "char"
        type_python: "Path"
        access: "SetAccess=protected, GetAccess=public"
        decision_log: >
          MATLAB stores as 'path'. Python stores as 'session_path' (a Path object).
          Semantic equivalent; Python also derives database_path and binary_path
          from session_path.

      - name: session_unique_reference
        type_matlab: "char"
        type_python: "str"
        access: "SetAccess=protected, GetAccess=public"
        decision_log: >
          MATLAB stores as a property. Python does not expose this directly;
          the session reference is managed by the session object.

    methods:
      # --- Constructor ---
      - name: database
        kind: constructor
        input_arguments:
          - name: path
            type_matlab: "char"
            type_python: "str | Path"
          - name: session_unique_reference
            type_matlab: "char"
            type_python: "str"
            default: "''"
        output_arguments:
          - name: ndi_database_obj
            type_python: "ndi_database"
        decision_log: >
          MATLAB: database(PATH, REFERENCE).
          Python: ndi_database(session_path, db_name='.ndi', **backend_kwargs).
          Python adds db_name parameter for directory naming flexibility.

      - name: newdocument
        input_arguments:
          - name: document_type
            type_matlab: "char"
            type_python: "str"
            default: "'base'"
        output_arguments:
          - name: ndi_document_obj
            type_python: "ndi_document"
        decision_log: >
          Present in MATLAB database.m. In Python this is handled by
          the session object (session.newdocument), not the ndi_database class directly.

      - name: add
        input_arguments:
          - name: ndi_document_obj
            type_matlab: "ndi.document"
            type_python: "ndi_document"
          - name: Update
            type_matlab: "logical (name-value)"
            type_python: "bool"
            default: "True"
        output_arguments:
          - name: ndi_database_obj
            type_python: "ndi_database"
        decision_log: >
          MATLAB add() supports an 'Update' name-value pair (default 1)
          that controls whether an existing document is updated or errors.
          Python separates this into add() (error on duplicate) and
          add_or_replace() (upsert). Synchronized 2026-03-13.

      - name: read
        input_arguments:
          - name: ndi_document_id
            type_matlab: "char"
            type_python: "str"
        output_arguments:
          - name: ndi_document_obj
            type_python: "ndi_document | None"
        decision_log: >
          MATLAB returns empty [] when not found; Python returns None.
          Synchronized 2026-03-13.

      - name: remove
        input_arguments:
          - name: ndi_document_id
            type_matlab: "ndi.document | char | cell"
            type_python: "ndi_document | str"
        output_arguments:
          - name: ndi_database_obj
            type_python: "bool"
        decision_log: >
          MATLAB accepts cell arrays; Python handles single doc/id.
          MATLAB modifies in-place; Python returns bool success.
          Synchronized 2026-03-13.

      - name: search
        input_arguments:
          - name: searchparams
            type_matlab: "ndi.query"
            type_python: "ndi_query | None"
        output_arguments:
          - name: ndi_document_objs
            type_python: "list[ndi_document]"
        decision_log: >
          MATLAB returns cell array of ndi.document; Python returns list.
          Synchronized 2026-03-13.

      - name: alldocids
        input_arguments: []
        output_arguments:
          - name: docids
            type_python: "list[str]"
        decision_log: >
          Exact match. MATLAB returns cell array; Python returns list.
          Synchronized 2026-03-13.

      - name: clear
        input_arguments:
          - name: areyousure
            type_matlab: "char"
            type_python: "str"
            default: "'no'"
        output_arguments: []
        decision_log: >
          Present in MATLAB. Not yet implemented in Python ndi_database class.
          Should be added for parity. Synchronized 2026-03-13.

      - name: openbinarydoc
        input_arguments:
          - name: ndi_document_or_id
            type_matlab: "ndi.document | char"
            type_python: "ndi_document | str"
          - name: filename
            type_matlab: "char"
            type_python: "str"
        output_arguments:
          - name: ndi_binarydoc_obj
            type_python: "Any"
        decision_log: >
          Present in MATLAB database.m. In Python this is handled by
          the session object (session.database_openbinarydoc), not
          the ndi_database class directly. Synchronized 2026-03-13.

      - name: existbinarydoc
        input_arguments:
          - name: ndi_document_or_id
            type_matlab: "ndi.document | char"
            type_python: "ndi_document | str"
          - name: filename
            type_matlab: "char"
            type_python: "str"
        output_arguments:
          - name: tf
            type_python: "bool"
          - name: file_path
            type_python: "Path | None"
        decision_log: >
          Present in MATLAB database.m. In Python this is handled by
          the session object (session.database_existbinarydoc).
          Synchronized 2026-03-13.

      - name: closebinarydoc
        input_arguments:
          - name: ndi_binarydoc_obj
            type_python: "Any"
        output_arguments:
          - name: ndi_binarydoc_obj
            type_python: "Any"
        decision_log: >
          Present in MATLAB database.m. In Python this is handled by
          the session object (session.database_closebinarydoc).
          Synchronized 2026-03-13.

      # --- Additional Python methods (from didsqlite subclass) ---

      - name: update
        input_arguments:
          - name: ndi_document_obj
            type_python: "ndi_document"
        output_arguments:
          - name: ndi_document_obj
            type_python: "ndi_document"
        decision_log: >
          From didsqlite subclass. Updates an existing document.
          Raises ValueError if not found. Synchronized 2026-03-13.

      - name: add_or_replace
        input_arguments:
          - name: ndi_document_obj
            type_python: "ndi_document"
        output_arguments:
          - name: ndi_document_obj
            type_python: "ndi_document"
        decision_log: >
          Python convenience. Upsert: adds if new, replaces if exists.
          Corresponds to MATLAB add() with Update=1.
          Synchronized 2026-03-13.

      - name: find_by_id
        input_arguments:
          - name: doc_id
            type_python: "str"
        output_arguments:
          - name: ndi_document_obj
            type_python: "ndi_document | None"
        decision_log: >
          Alias for read(). Convenience for MATLAB compatibility.
          Synchronized 2026-03-13.

      - name: numdocs
        input_arguments: []
        output_arguments:
          - name: n
            type_python: "int"
        decision_log: >
          Python convenience. Returns count of documents in database.
          Synchronized 2026-03-13.

      - name: find_depends_on
        input_arguments:
          - name: document
            type_python: "ndi_document | str"
        output_arguments:
          - name: dependent_docs
            type_python: "list[ndi_document]"
        decision_log: >
          Python convenience. Finds all documents that depend on
          the given document. Synchronized 2026-03-13.

      - name: find_dependencies
        input_arguments:
          - name: document
            type_python: "ndi_document | str"
        output_arguments:
          - name: dependency_docs
            type_python: "list[ndi_document]"
        decision_log: >
          Python convenience. Finds all documents that the given
          document depends on. Synchronized 2026-03-13.

      - name: add_many
        input_arguments:
          - name: documents
            type_python: "list[ndi_document]"
        output_arguments:
          - name: added_docs
            type_python: "list[ndi_document]"
        decision_log: >
          Python convenience. Batch add. Stops on first error.
          Synchronized 2026-03-13.

      - name: remove_many
        input_arguments:
          - name: query
            type_python: "ndi_query | None"
            default: "None"
          - name: documents
            type_python: "list[ndi_document] | None"
            default: "None"
        output_arguments:
          - name: count
            type_python: "int"
        decision_log: >
          Python convenience. Removes documents matching query
          and/or explicit list. Returns count removed.
          Synchronized 2026-03-13.

      - name: get_binary_path
        input_arguments:
          - name: document
            type_python: "ndi_document"
          - name: file_name
            type_python: "str"
        output_arguments:
          - name: path
            type_python: "Path"
        decision_log: >
          Python convenience. Returns path for storing a
          document's binary file. Synchronized 2026-03-13.

    decision_log: >
      Python ndi_database class merges the abstract ndi.database base class
      with the concrete ndi.database.implementations.database.didsqlite
      subclass. Synchronized 2026-03-13.

# =========================================================================
# Standalone functions
# =========================================================================
functions:

  - name: open_database
    type: function
    matlab_path: "+ndi/+database/+fun/opendatabase.m"
    matlab_last_sync_hash: "0d40859f"
    python_path: "ndi/database.py"
    python_name: "open_database"
    input_arguments:
      - name: session_path
        type_matlab: "char"
        type_python: "str | Path"
      - name: kwargs
        type_python: "**kwargs"
    output_arguments:
      - name: db
        type_python: "ndi_database"
    decision_log: >
      MATLAB: opendatabase(database_path, session_unique_reference).
      Python: open_database(session_path, **kwargs). The Python version
      is a simpler factory that creates a ndi_database instance directly,
      while MATLAB searches a hierarchy of database implementations.
      Synchronized 2026-03-13.
